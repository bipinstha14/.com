<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Intelligence Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root {
    --primary:#0071e3;
    --dark:#0f172a;
    --light:#f8fafc;
    --gray:#64748b;
}

body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    overflow: hidden;
    background: var(--dark);
}

/* ================= NAVIGATION ================= */

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 5%;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(10px);
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
    z-index: 3000;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

nav img {
    height: 70px;
}

.nav-links {
    display: flex;
    align-items: center;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 2rem;
    font-size: 0.9rem;
    transition: 0.3s;
}

.nav-links a:hover {
    color: var(--primary);
}

/* ================= MAP ================= */

#map {
    position: absolute;
    top: 90px; /* IMPORTANT: makes space for navbar */
    left: 0;
    width: 100%;
    height: calc(100vh - 90px);
}

/* ================= PANEL ================= */

#panel {
    position: absolute;
    top: 90px;
    right: -40%;
    width: 35%;
    height: calc(100vh - 90px);
    background: var(--dark);
    color: white;
    padding: 30px;
    overflow-y: auto;
    box-sizing: border-box;
    transition: 0.3s ease;
    z-index: 2000;
}

#panel.active {
    right: 0;
}

/* content */
h1 {
    font-size: 18px;
    margin-bottom: 20px;
    color: #60a5fa;
}

.stat {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    padding: 10px;
    background: #111827;
    border-radius: 8px;
}

/* scrollbar */
#panel::-webkit-scrollbar {
    width: 6px;
}
#panel::-webkit-scrollbar-thumb {
    background: #2563eb;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- ================= NAVIGATION ================= -->
<nav>
    <a href="index.html" style="display:flex;align-items:center;text-decoration:none;">
        <img src="logo.png" alt="Logo">
    </a>

    <div class="nav-links">
        <a href="index.html#solutions">Solutions</a>
        <a href="index.html#technology">Technology</a>
        <a href="global.html">Global</a>
        <a href="index.html#research">Research</a>
        <a href="index.html#technical">Technical</a>
        <a href="index.html#contact">Contact</a>
    </div>
</nav>

<!-- ================= MAP ================= -->
<div id="map"></div>

<!-- ================= PANEL ================= -->
<div id="panel"></div>

<script>

// MAP INIT
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: ''
}).addTo(map);

// DATA
const locations = [
{
    name: "LSU Health",
    country: "USA",
    lat: 29.9511,
    lng: -90.0715,
    type: "Academic Health Centre",
    focus: "Clinical research & education"
},
{
    name: "StandSure Physiotherapy",
    country: "UK",
    lat: 51.5074,
    lng: -0.1278,
    type: "Physiotherapy Clinic",
    focus: "Rehabilitation & mobility care"
},
{
    name: "King Abdulaziz Medical City",
    country: "Saudi Arabia",
    lat: 21.4858,
    lng: 39.1925,
    type: "Hospital",
    focus: "Specialist care & research"
},
{
    name: "SERI Singapore",
    country: "Singapore",
    lat: 1.2966,
    lng: 103.7764,
    type: "Research Institute",
    focus: "Vision science & ophthalmology"
},
{
    name: "Hallmark Physiotherapy",
    country: "Singapore",
    lat: 1.3521,
    lng: 103.8198,
    type: "Physio Clinic",
    focus: "Sports rehabilitation"
},
{
    name: "Muscle Mastery PNG",
    country: "PNG",
    lat: -9.4438,
    lng: 147.1803,
    type: "Physio Clinic",
    focus: "Pain management & recovery"
},
{
    name: "Hutt Hospital ED",
    country: "New Zealand",
    lat: -41.2090,
    lng: 174.9080,
    type: "Emergency Department",
    focus: "Acute emergency care"
}
];

const panel = document.getElementById("panel");

// OPEN PANEL
function showPanel(loc) {
    panel.classList.add("active");

    panel.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <h1>${loc.name}</h1>
            <button onclick="closePanel()" style="
                background:#ef4444;
                border:none;
                color:white;
                padding:6px 10px;
                border-radius:6px;
                cursor:pointer;
            ">✕</button>
        </div>

        <div class="stat"><span>Type</span><b>${loc.type}</b></div>
        <div class="stat"><span>Country</span><b>${loc.country}</b></div>
        <div class="stat"><span>Focus</span><b>${loc.focus}</b></div>

        <hr style="border:0;border-top:1px solid #1f2937;margin:15px 0;">

        <p style="color:#94a3b8;font-size:13px;line-height:1.5;">
            Global Balance Mat deployment node with real-time clinical integration.
        </p>
    `;
}

function closePanel() {
    panel.classList.remove("active");
}

// MARKERS
locations.forEach(loc => {
    const marker = L.marker([loc.lat, loc.lng]).addTo(map);
    marker.on('click', () => showPanel(loc));
});

</script>

</body>
</html>
