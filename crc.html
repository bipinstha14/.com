<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRC (Care Economy) | Balance Mat</title>
    <style>
        :root {
            --primary: #0071e3;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: var(--light); color: var(--dark); overflow-x: hidden; }

        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 5%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { text-decoration: none; display: flex; align-items: center; }
        .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
        .logo-title { font-size: 2rem; font-weight: 700; color: white; letter-spacing: -0.5px; }
        .logo-tagline { font-size: 0.75rem; font-weight: 600; color: #f5a623; letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }
        .nav-links { display: flex; align-items: center; list-style: none; }
        .nav-links a { color: var(--light); text-decoration: none; margin-left: 2rem; font-size: 0.9rem; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        .dropdown { position: relative; display: inline-block; margin-left: 2rem; }
        .dropdown > a { margin-left: 0; }
        .dropdown-menu {
            display: none;
            position: absolute;
            background: #0f172a;
            min-width: 250px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            top: 100%;
            left: 0;
            padding: 0.75rem 0;
            z-index: 2000;
            margin-top: 0.5rem;
        }
        .dropdown-menu a { display: block; padding: 0.6rem 1.2rem; margin: 0; font-size: 0.85rem; color: #cbd5e1; text-decoration: none; transition: background 0.2s, color 0.2s; cursor: pointer; }
        .dropdown-menu a:hover { background: rgba(0, 113, 227, 0.15); color: #fff; }
        .dropdown-menu a.current { color: var(--primary); font-weight: 600; }

        /* Hero */
        .hero { background: linear-gradient(180deg, #ffffff 0%, #eef4fb 100%); padding: 10rem 5% 5rem; text-align: center; }
        .badge { background: rgba(0, 113, 227, 0.1); border: 1px solid var(--primary); color: var(--primary); padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.85rem; display: inline-block; margin-bottom: 1.5rem; text-transform: uppercase; font-weight: 600; }
        .hero h1 { font-size: 2.75rem; font-weight: 800; line-height: 1.15; margin-bottom: 1.25rem; max-width: 850px; margin-left: auto; margin-right: auto; }
        .hero p { font-size: 1.15rem; color: #475569; margin-bottom: 2rem; max-width: 650px; margin-left: auto; margin-right: auto; }
        .btn { background: var(--primary); color: white; padding: 0.85rem 1.75rem; border-radius: 8px; text-decoration: none; font-weight: 600; display: inline-block; transition: transform 0.2s, background 0.2s; border: none; cursor: pointer; font-size: 0.95rem; }
        .btn:hover { background: #0077ed; transform: translateY(-2px); }
        .btn-outline { background: transparent; color: var(--dark); border: 1.5px solid #cbd5e1; }
        .btn-outline:hover { background: #f1f5f9; }
        .hero-ctas { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
